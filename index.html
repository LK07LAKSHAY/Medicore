<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MediCore</title>
    <style>
        /* Custom styles for newer updates */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 200px;
            margin: 0 auto;
        }
        .logo-container img {
            width: 100%;
            height: auto;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .wordmark {
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            margin-left: 15px;
            letter-spacing: 1px;
        }
        .datetime-widget {
            position: relative;
            display: inline-block;
            margin-left: 20px;
        }
        .dark-mode-toggle {
            cursor: pointer;
            transition: background-color 0.3s;
        }
        /* Dropdown styles */
        .dropdown {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .dropdown-content {
            padding: 12px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="path/to/logo.png" alt="MediCore Logo">
        </div>
        <nav class="navbar">
            <div class="wordmark">MediCore</div>
            <div class="datetime-widget"> 
                <button onclick="toggleDropdown()">Time Format</button>
                <div id="dropdown" class="dropdown"> 
                    <div class="dropdown-content" onclick="setTimeFormat('12h')">12-Hour</div>
                    <div class="dropdown-content" onclick="setTimeFormat('24h')">24-Hour</div>
                </div>
                <button onclick="toggleDropdown()">Date Format</button>
                <div id="dropdown" class="dropdown"> 
                    <div class="dropdown-content" onclick="setDateFormat('dd/MMM/YYYY')">DD MMM YYYY</div>
                    <div class="dropdown-content" onclick="setDateFormat('MM/DD/YYYY')">MM/DD/YYYY</div>
                    <div class="dropdown-content" onclick="setDateFormat('YYYY-MM-DD')">YYYY-MM-DD</div>
                </div>
            </div>
            <div class="dark-mode-toggle" onclick="toggleDarkMode()">Toggle Dark Mode</div>
        </nav>
    </header>
    <script>
        // Local Storage powered time and date functions
        function setTimeFormat(format) {
            localStorage.setItem('timeFormat', format);
            // logic to update UI with format
        }

        function setDateFormat(format) {
            localStorage.setItem('dateFormat', format);
            // logic to update UI with format
        }

        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', body.classList.contains('dark-mode'));
        }

        function toggleDropdown() {
            document.getElementById('dropdown').classList.toggle('show');
        }
    </script>
    <!-- Rest of your page content here... -->
</body>
</html>
